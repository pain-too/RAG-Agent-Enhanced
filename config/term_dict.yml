# ============================================================
# 408 数据结构术语标准化词典
# ============================================================
# 将口语/缩写/英文缩写映射为标准中文术语
# 用于 Query Rewriter 的术语标准化阶段（纯规则，不调 LLM）
# ============================================================

terms:
  # ──── 树的变体 ────
  - aliases: ["B树", "b树", "b-tree"]
    standard: "B-树"
  - aliases: ["B+树", "b+树", "b+tree"]
    standard: "B+树"
  - aliases: ["B-树", "b-树"]
    standard: "B-树"
  - aliases: ["二叉排序树", "二叉查找树", "BST", "bst"]
    standard: "二叉搜索树"
  - aliases: ["红黑树", "RB树", "红黑", "rbtree"]
    standard: "红黑树"
  - aliases: ["AVL树", "AVL", "avl树", "平衡二叉树"]
    standard: "AVL树"
  - aliases: ["哈夫曼树", "霍夫曼树", "Huffman树", "huffman"]
    standard: "哈夫曼树"
  - aliases: ["完全二叉树", "满二叉树"]
    standard: "完全二叉树"

  # ──── 图论 ────
  - aliases: ["DFS", "dfs", "深度优先"]
